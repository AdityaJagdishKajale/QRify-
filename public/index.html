<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QRify</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    form { margin-bottom: 1rem; }
    input, select { margin: 0.2rem 0; display: block; }
    #qrResult img { max-width: 200px; }
  </style>
</head>
<body>
  <h1>QRify</h1>

  <div id="auth">
    <h2>Signup</h2>
    <form id="signupForm">
      <input type="email" id="signupEmail" placeholder="Email" required />
      <input type="password" id="signupPassword" placeholder="Password" required />
      <button type="submit">Sign up</button>
    </form>

    <h2>Login</h2>
    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email" required />
      <input type="password" id="loginPassword" placeholder="Password" required />
      <button type="submit">Log in</button>
    </form>
  </div>

  <div id="app" style="display:none;">
    <button id="logoutBtn">Logout</button>

    <h2>Generate QR</h2>
    <form id="generateForm">
      <input type="text" id="qrText" placeholder="Text/URL/etc" required />
      <select id="qrType">
        <option value="url">URL</option>
        <option value="text">Text</option>
        <option value="email">Email</option>
        <option value="phone">Phone</option>
        <option value="wifi">WiFi</option>
        <option value="contact">Contact</option>
      </select>
      <input type="date" id="qrExpire" />
      <input type="text" id="qrPassword" placeholder="Password (optional)" />
      <label><input type="checkbox" id="qrOneTime" /> One-time use</label>
      <button type="submit">Create QR</button>
    </form>
    <div id="qrResult"></div>

    <h2>Dashboard</h2>
    <button id="refreshDashboard">Refresh</button>
    <div id="dashboard"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
